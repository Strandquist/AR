<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* Stilren, minimalistisk laddningsskärm */
      #loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #050505;
        color: #ffffff;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        z-index: 9999;
        transition: opacity 0.8s ease;
      }
      #loading-overlay p {
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #aaaaaa;
      }
    </style>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const sceneEl = document.querySelector('a-scene');
        const overlay = document.querySelector('#loading-overlay');

        // Dölj laddningsskärmen mjukt när AR-scenen är redo
        sceneEl.addEventListener("renderstart", () => {
          setTimeout(() => {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 800);
          }, 600);
        });

        // Struktur för alla targets och videor
        const targets = [
          { target: document.querySelector('#target1'), vid: document.querySelector('#vid1'), aVid: document.querySelector('#a-vid1'), timeout: null, fadeInterval: null },
          { target: document.querySelector('#target2'), vid: document.querySelector('#vid2'), aVid: document.querySelector('#a-vid2'), timeout: null, fadeInterval: null }
        ];

        // Mjuk ljud- och bild-fade-in
        const playVideo = (item) => {
          clearTimeout(item.timeout);
          clearInterval(item.fadeInterval);

          if (item.vid.paused) {
            item.vid.currentTime = 0; // Spola alltid tillbaka till början
            item.vid.volume = 0; // Börja helt tyst
            item.vid.play();

            // 1. Visuell fade-in (opacitet över 500ms)
            item.aVid.setAttribute('animation', 'property: material.opacity; to: 1; dur: 500; easing: easeInOutQuad');

            // 2. Ljud-fade-in (rampa volym från 0 till 1 över 500ms)
            let vol = 0;
            const step = 0.05; 
            item.fadeInterval = setInterval(() => {
              vol += step;
              if (vol >= 1) {
                item.vid.volume = 1;
                clearInterval(item.fadeInterval);
              } else {
                item.vid.volume = vol;
              }
            }, 25);
          }
        };

        // Pausa vid target lost (med 500ms fördröjning för att förhindra flimmer)
        const pauseVideo = (item) => {
          clearInterval(item.fadeInterval);
          item.timeout = setTimeout(() => {
            item.vid.pause();
            item.vid.volume = 0;
            item.aVid.removeAttribute('animation');
            item.aVid.setAttribute('material', 'opacity: 0');
          }, 500);
        };

        targets.forEach(item => {
          item.target.addEventListener("targetFound", () => playVideo(item));
          item.target.addEventListener("targetLost", () => pauseVideo(item));
        });

        // Slå på ljudet i bakgrunden vid första klicket på skärmen
        window.addEventListener('click', () => {
          targets.forEach(item => {
            item.vid.muted = false;
          });
        }, { once: true });
      });
    </script>
  </head>
  <body>
    <!-- Laddningsskärm -->
    <div id="loading-overlay">
      <p>Startar kameran...</p>
    </div>

    <!-- Filter är justerade för snabbare identifiering utan att frysa telefonen -->
    <a-scene mindar-image="imageTargetSrc: target.mind; filterMinCF: 0.001; filterBeta: 0.01; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- preload="metadata" skonar processorn så kameran startar mycket snabbare -->
        <video id="vid1" src="video1.mp4" preload="metadata" loop muted playsinline></video>
        <video id="vid2" src="video2.mp4" preload="metadata" loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Bild 1 -->
      <a-entity id="target1" mindar-image-target="targetIndex: 1">
        <a-video id="a-vid1" src="#vid1" position="0 0 0" width="1" height="0.628" scale="1.02 1.02 1.02" material="opacity: 0; transparent: true"></a-video>
      </a-entity>

      <!-- Bild 2 -->
      <a-entity id="target2" mindar-image-target="targetIndex: 0">
        <a-video id="a-vid2" src="#vid2" position="0 0 0" width="1" height="0.628" scale="1.02 1.02 1.02" material="opacity: 0; transparent: true"></a-video>
      </a-entity>

    </a-scene>
  </body>
</html>
