<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const target1 = document.querySelector('#target1');
        const target2 = document.querySelector('#target2');
        const vid1 = document.querySelector('#vid1');
        const vid2 = document.querySelector('#vid2');
        
        // Hämta det visuella A-frame elementet för att kunna styra opaciteten
        const aVid1 = document.querySelector('#a-vid1'); 
        const aVid2 = document.querySelector('#a-vid2');

        // Funktion för en mjuk, sömlös start från början
        const playVideo = (vid, aVid) => {
          vid.currentTime = 0; // Spolar alltid tillbaka till ruta 1
          vid.play();
          // Skapar en snygg fade-in över 500 millisekunder
          aVid.setAttribute('animation', 'property: material.opacity; to: 1; dur: 500; easing: easeInOutQuad'); 
        };

        // Funktion när kameran tittar bort
        const pauseVideo = (vid, aVid) => {
          vid.pause();
          aVid.removeAttribute('animation');
          aVid.setAttribute('material', 'opacity: 0'); // Döljer videon direkt så den inte fryser fult i luften
        };

        // Koppla logiken till Bild 1
        target1.addEventListener("targetFound", () => playVideo(vid1, aVid1));
        target1.addEventListener("targetLost", () => pauseVideo(vid1, aVid1));

        // Koppla logiken till Bild 2
        target2.addEventListener("targetFound", () => playVideo(vid2, aVid2));
        target2.addEventListener("targetLost", () => pauseVideo(vid2, aVid2));
        
        // Tillåt ljud vid första klicket
        window.addEventListener('click', () => {
          vid1.muted = false;
          vid2.muted = false;
        });
      });
    </script>
  </head>
  <body>
    <!-- filterMinCF och filterBeta är lagda till här för att ta bort skakningar (jitter) -->
    <a-scene mindar-image="imageTargetSrc: target.mind; filterMinCF: 0.0001; filterBeta: 0.001;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid1" src="video1.mp4" loop muted playsinline></video>
        <video id="vid2" src="video2.mp4" loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target1" mindar-image-target="targetIndex: 0">
        <!-- material="opacity: 0; transparent: true" gör videon osynlig tills kameran hittar bilden -->
        <a-video id="a-vid1" src="#vid1" position="0 0 0" height="1" width="1" material="opacity: 0; transparent: true"></a-video>
      </a-entity>

      <a-entity id="target2" mindar-image-target="targetIndex: 1">
        <a-video id="a-vid2" src="#vid2" position="0 0 0" height="1" width="1" material="opacity: 0; transparent: true"></a-video>
      </a-entity>

    </a-scene>
  </body>
</html>
