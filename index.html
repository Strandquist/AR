<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const target1 = document.querySelector('#target1');
        const vid1 = document.querySelector('#vid1');
        const aVid1 = document.querySelector('#a-vid1');

        const target2 = document.querySelector('#target2');
        const vid2 = document.querySelector('#vid2');
        const aVid2 = document.querySelector('#a-vid2');

        // Variabler för att hålla koll på vår mikro-dropp fördröjning
        let timeout1;
        let timeout2;

        // Logik för Bild 1
        target1.addEventListener("targetFound", () => {
          clearTimeout(timeout1); // Avbryt pausen om kameran hittar bilden igen snabbt
          if (vid1.paused) {
            vid1.currentTime = 0;
            vid1.play();
            aVid1.setAttribute('animation', 'property: material.opacity; to: 1; dur: 500; easing: easeInOutQuad');
          }
        });
        target1.addEventListener("targetLost", () => {
          timeout1 = setTimeout(() => { // Vänta 500ms innan videon faktiskt försvinner
            vid1.pause();
            aVid1.removeAttribute('animation');
            aVid1.setAttribute('material', 'opacity: 0');
          }, 500);
        });

        // Logik för Bild 2
        target2.addEventListener("targetFound", () => {
          clearTimeout(timeout2);
          if (vid2.paused) {
            vid2.currentTime = 0;
            vid2.play();
            aVid2.setAttribute('animation', 'property: material.opacity; to: 1; dur: 500; easing: easeInOutQuad');
          }
        });
        target2.addEventListener("targetLost", () => {
          timeout2 = setTimeout(() => {
            vid2.pause();
            aVid2.removeAttribute('animation');
            aVid2.setAttribute('material', 'opacity: 0');
          }, 500);
        });
        
        // Tillåt ljud vid första klicket
        window.addEventListener('click', () => {
          vid1.muted = false;
          vid2.muted = false;
        });
      });
    </script>
  </head>
  <body>
    <!-- uiLoading="no" och uiScanning="no" ger en helt ren kamera utan störande grafik -->
    <a-scene mindar-image="imageTargetSrc: target.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <!-- preload="auto" tvingar ner videon i minnet direkt för blixtsnabb start -->
        <video id="vid1" src="video1.mp4" preload="auto" loop muted playsinline></video>
        <video id="vid2" src="video2.mp4" preload="auto" loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target1" mindar-image-target="targetIndex: 1">
        <!-- scale="1.02 1.02 1.02" skapar den osynliga marginalen -->
        <a-video id="a-vid1" src="#vid1" position="0 0 0" height="1" width="1" scale="1.02 1.02 1.02" material="opacity: 0; transparent: true"></a-video>
      </a-entity>

      <a-entity id="target2" mindar-image-target="targetIndex: 0">
        <a-video id="a-vid2" src="#vid2" position="0 0 0" height="1" width="1" scale="1.02 1.02 1.02" material="opacity: 0; transparent: true"></a-video>
      </a-entity>

    </a-scene>
  </body>
</html>
